<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHS Elite De-escalation Lab</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome for reliable icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F0F4F8; color: #1e293b; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .nhs-blue { background-color: #005EB8; }
        .nhs-text { color: #005EB8; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        (function() {
            const { useState, useEffect, useRef } = React;
            
            // Standard Icon Component using FontAwesome
            const Icon = ({ name, size = 20, className = "", spin = false }) => (
                <i className={`fa-solid fa-${name} ${spin ? 'fa-spin' : ''} ${className}`} style={{ fontSize: size }}></i>
            );

            // API Key integrated for beta/stakeholder testing
            const apiKey = "AIzaSyD0ihaE53aT1d81aQPzkk05-Xz23c0R2uc"; 
            const appId = "nhs-elite-lab-live";

            const SCENARIOS = [
                {
                    id: 'henderson',
                    title: 'The Demanding Patient',
                    type: 'Demanding / Fear',
                    patientName: 'Mr. Henderson',
                    age: 58,
                    context: 'Angry because his blood pressure prescription isn’t at the pharmacy. He’s been in the 8 AM phone queue and feels dismissed.',
                    initialTrigger: "I've been waiting for my prescription for three days! Every time I call the pharmacy they tell me the Practice hasn't signed it. I'm out of my pills, what am I supposed to do?",
                    imagePrompt: '58-year-old British man, red-faced, frustrated, NHS surgery background.',
                    voice: 'Charon'
                },
                {
                    id: 'gaskell',
                    title: 'The Manipulative Patient',
                    type: 'Manipulation (Splitting Staff)',
                    patientName: 'Mrs. Gaskell',
                    age: 64,
                    context: 'Trying to bypass the triage system. Claims Dr. Khan "always makes an exception" for her and told her to just call and get squeezed in.',
                    initialTrigger: "Look, dear, I know you're busy, but Dr. Khan specifically told me to call and he'd see me today. He knows my situation. Surely you can just pop me in his list?",
                    imagePrompt: '64-year-old British woman, wearing a scarf, appearing overly friendly but insistent, NHS waiting room.',
                    voice: 'Leda'
                },
                {
                    id: 'sterling',
                    title: 'The Entitled Patient',
                    type: 'Entitlement',
                    patientName: 'Mr. Sterling',
                    age: 52,
                    context: 'Refuses to use the new online triage system. Believes that as a "taxpayer" he shouldn’t have to "do the work" for the staff.',
                    initialTrigger: "I'm not filling in a bloody online form. I pay my taxes for this service. I want to speak to a human being and get an appointment now. Why are you making it so difficult?",
                    imagePrompt: '52-year-old British man, sharp suit, looking down his nose, defensive posture, GP reception.',
                    voice: 'Puck'
                },
                {
                    id: 'third-party',
                    title: 'The Third-Party Caller',
                    type: 'Confidentiality / Disclosure',
                    patientName: 'Sarah (Daughter)',
                    age: 35,
                    context: 'Calling about her elderly father. Demanding to know his test results immediately. She is using threats of escalation to bypass consent rules.',
                    initialTrigger: "I'm calling about my father, Arthur. I need his blood results now. I don't care about 'data protection'—I'm his daughter and I'll be taking this to the CQC if you don't tell me what's going on!",
                    imagePrompt: '35-year-old British woman, holding a phone, looking stressed and confrontational.',
                    voice: 'Aoede'
                }
            ];

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) {
                        view.setUint8(offset + i, string.charCodeAt(i));
                    }
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 32 + pcmData.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) {
                    view.setInt16(44 + i * 2, pcmData[i], true);
                }
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const App = () => {
                const [step, setStep] = useState('intro'); 
                const [activeScenario, setActiveScenario] = useState(SCENARIOS[0]);
                const [messages, setMessages] = useState([]);
                const [userInput, setUserInput] = useState('');
                const [isTyping, setIsTyping] = useState(false);
                const [agitation, setAgitation] = useState(60);
                const [contactPhase, setContactPhase] = useState('Opening');
                const [boundaryRung, setBoundaryRung] = useState(1);
                const [detectedTactic, setDetectedTactic] = useState(null);
                const [patientImage, setPatientImage] = useState(null);
                const [mentorFeedback, setMentorFeedback] = useState("Greet the person using the 4-Part Contact Structure.");
                const [isGeneratingImage, setIsGeneratingImage] = useState(false);
                const [documentation, setDocumentation] = useState("");

                const scrollRef = useRef(null);
                const audioRef = useRef(null);

                useEffect(() => {
                    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }, [messages, isTyping]);

                const generateVoice = async (text, agitationLevel) => {
                    if (!apiKey) return;
                    try {
                        const moodInstruction = agitationLevel > 80 
                            ? "shouting, aggressive, intense British accent" 
                            : agitationLevel < 35 
                            ? "calm, settling, weary but appreciative" 
                            : "frustrated, firm, annoyed British persona";

                        const voicePrompt = `${activeScenario.patientName}: (${moodInstruction}) ${text}`;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: voicePrompt }] }],
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: activeScenario.voice } } }
                                }
                            })
                        });
                        
                        if (!response.ok) return;
                        const result = await response.json();
                        const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                        if (!pcmData) return;

                        const wavBlob = pcmToWav(new Int16Array(Uint8Array.from(atob(pcmData), c => c.charCodeAt(0)).buffer), 24000);
                        const url = URL.createObjectURL(wavBlob);
                        if (audioRef.current) {
                            audioRef.current.src = url;
                            audioRef.current.play().catch(() => {});
                        }
                    } catch (e) { console.error(e); }
                };

                const generatePatientFace = async (agitationLevel) => {
                    if (!apiKey) return;
                    setIsGeneratingImage(true);
                    try {
                        const mood = agitationLevel > 85 ? "shouting, furious, red-faced" : 
                                     agitationLevel > 65 ? "angry scowl, visible frustration" : 
                                     agitationLevel > 40 ? "skeptical, defensive" : "calm, professional, neutral";
                        
                        const prompt = `Hyper-realistic portrait of ${activeScenario.imagePrompt}. Mood is ${mood}. Cinematic lighting, UK NHS GP surgery background.`;
                        
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1 } })
                        });
                        
                        const data = await response.json();
                        if (data.predictions?.[0]?.bytesBase64Encoded) {
                            setPatientImage(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`);
                        }
                    } catch (e) { console.error(e); }
                    finally { setIsGeneratingImage(false); }
                };

                const processResponse = async (userMsg) => {
                    if (!userMsg.trim()) return;
                    setIsTyping(true);
                    setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                    setUserInput('');

                    try {
                        const systemPrompt = `You are the Expert Coach (Lindsay) and the Character (${activeScenario.patientName}). 
                        LOCATION: NHS GP Surgery (UK).
                        CONTEXT: ${activeScenario.context}
                        RULES: 
                        1. Use UK Terms (Postcode, GP, meds, A&E). 
                        2. Do not escalate over minor phrasing errors if tone is professional. 
                        3. Apply Miller's Law (validate frustration as real). 
                        4. Identify 4-Part structure (Open, Gather, Check, Close).
                        
                        JSON: { "patientReply", "agitationDelta", "tacticDetected", "currentPhase", "mentorFeedback", "rungLevel", "docEntry" }`;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `User: "${userMsg}". Agitation: ${agitation}. Phase: ${contactPhase}.` }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        
                        const result = await response.json();
                        const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!rawText) throw new Error("Empty response");
                        const parsed = JSON.parse(rawText);

                        const newAgit = Math.min(100, Math.max(0, agitation + (parsed.agitationDelta || 0)));
                        setAgitation(newAgit);
                        if (parsed.currentPhase) setContactPhase(parsed.currentPhase);
                        setDetectedTactic(parsed.tacticDetected || null);
                        setMentorFeedback(parsed.mentorFeedback || "Keep using the frameworks.");
                        if (parsed.rungLevel) setBoundaryRung(parsed.rungLevel);
                        if (parsed.docEntry) setDocumentation(prev => prev + "\n" + parsed.docEntry);
                        
                        const reply = parsed.patientReply || "I'm still waiting.";
                        setMessages(prev => [...prev, { role: 'ai', text: reply }]);
                        
                        generateVoice(reply, newAgit);
                        if (Math.abs(parsed.agitationDelta || 0) > 4 || !patientImage) {
                            generatePatientFace(newAgit);
                        }
                    } catch (e) {
                        setMessages(prev => [...prev, { role: 'ai', text: "Error connecting to AI advisor." }]);
                    } finally { setIsTyping(false); }
                };

                if (step === 'intro') return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-4xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
                            <div className="md:w-1/2 nhs-blue p-12 flex flex-col justify-center text-white">
                                <Icon name="shield-halved" size={40} className="mb-4 opacity-80" />
                                <h1 className="text-6xl font-black mb-6 tracking-tighter leading-none">CONFLICT<br/>LAB 2.0</h1>
                                <p className="text-blue-100 mb-10 font-medium">Step into a high-fidelity NHS Practice simulation. Master the Dubock Framework.</p>
                                <button onClick={() => setStep('picker')} className="bg-white nhs-text py-5 px-12 rounded-2xl font-black shadow-2xl hover:scale-105 transition-all w-fit uppercase text-sm tracking-widest">Select Case</button>
                            </div>
                            <div className="md:w-1/2 bg-slate-50 p-12 flex flex-col justify-center gap-4">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex gap-4">
                                    <Icon name="bullseye" className="nhs-text shrink-0" />
                                    <div><p className="font-bold text-slate-800">Miller's Law</p><p className="text-xs text-slate-500">Validation is your primary tool.</p></div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex gap-4">
                                    <Icon name="table-cells-large" className="nhs-text shrink-0" />
                                    <div><p className="font-bold text-slate-800">4-Part Structure</p><p className="text-xs text-slate-500">Maintain pace from Open to Close.</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                );

                if (step === 'picker') return (
                    <div className="min-h-screen p-8 flex flex-col items-center justify-center bg-slate-50">
                        <h2 className="text-4xl font-black text-slate-800 mb-8 tracking-tighter">CHOOSE CASE STUDY</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl w-full">
                            {SCENARIOS.map(s => (
                                <button key={s.id} onClick={() => { setActiveScenario(s); setStep('sim'); }} className="bg-white p-8 rounded-[40px] shadow hover:shadow-2xl border-2 border-transparent hover:border-[#005EB8] transition-all text-left group">
                                    <span className="text-[10px] font-black uppercase nhs-text bg-blue-50 px-2 py-1 rounded mb-4 inline-block tracking-widest">{s.type}</span>
                                    <h3 className="text-2xl font-bold mb-2 text-slate-800 group-hover:nhs-text transition-colors">{s.patientName}</h3>
                                    <p className="text-sm text-slate-500 leading-relaxed line-clamp-2">{s.context}</p>
                                    <div className="mt-4 flex items-center gap-2 nhs-text font-bold text-xs opacity-0 group-hover:opacity-100">START SCENARIO <Icon name="arrow-right" size={14}/></div>
                                </button>
                            ))}
                        </div>
                    </div>
                );

                return (
                    <div className="h-screen flex flex-col p-4 gap-4 overflow-hidden bg-slate-100">
                        <div className="grid grid-cols-4 gap-4">
                            <div className="bg-white rounded-2xl p-4 shadow-sm flex items-center gap-4">
                                <div className="nhs-blue p-3 rounded-xl text-white"><Icon name="table-cells-large" size={20}/></div>
                                <div className="flex-1">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Contact Phase</p>
                                    <p className="font-black nhs-text">{contactPhase}</p>
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl p-4 shadow-sm flex items-center gap-4">
                                <div className="bg-amber-100 p-3 rounded-xl text-amber-600"><Icon name="triangle-exclamation" size={20}/></div>
                                <div className="flex-1">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Boundaries Ladder</p>
                                    <p className="font-black text-amber-700">Level {boundaryRung}</p>
                                </div>
                            </div>
                            <div className="col-span-2 bg-[#232f3e] rounded-2xl p-4 shadow-xl flex items-center gap-4 border border-white/10">
                                <Icon name="brain" className="text-blue-300 shrink-0" size={24}/>
                                <div className="text-blue-100 italic text-sm font-medium leading-tight">"{mentorFeedback}"</div>
                            </div>
                        </div>

                        <div className="flex-1 flex gap-4 overflow-hidden">
                            <div className="flex-1 bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden relative border border-slate-200">
                                {(isTyping || isGeneratingImage) && (
                                    <div className="absolute inset-0 bg-white/70 backdrop-blur-sm z-50 flex flex-col items-center justify-center font-black nhs-text text-lg text-center p-8">
                                        <Icon name="spinner" spin={true} size={40} className="mb-4" />
                                        ANALYSING INTERACTION...
                                    </div>
                                )}
                                <div className="nhs-blue p-4 text-white font-bold flex justify-between items-center shadow-lg">
                                    <span className="text-xs tracking-widest uppercase font-black">NHS GP LIVE LAB: {activeScenario.title}</span>
                                    {detectedTactic && <span className="bg-red-600 px-3 py-1 rounded-full text-[10px] animate-pulse border border-white/30 uppercase">TACTIC: {detectedTactic}</span>}
                                </div>
                                <div className="flex-1 flex overflow-hidden">
                                    <div className="w-80 border-r bg-slate-50 flex flex-col">
                                        <div className="h-1/2 relative bg-black overflow-hidden">
                                            {patientImage ? <img src={patientImage} className="w-full h-full object-cover" /> : <div className="h-full flex items-center justify-center opacity-20 text-white"><Icon name="user" size={48}/></div>}
                                            <div className="absolute bottom-0 inset-x-0 p-4 bg-gradient-to-t from-black to-transparent text-white">
                                                <div className="flex justify-between text-[10px] font-black uppercase mb-1"><span>Patient Agitation</span><span>{agitation}%</span></div>
                                                <div className="w-full h-1 bg-white/20 rounded-full mt-1 overflow-hidden">
                                                    <div className="h-full bg-white transition-all duration-1000 shadow-[0_0_8px_rgba(255,255,255,0.8)]" style={{width:`${agitation}%`}}></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex-1 p-4 overflow-y-auto custom-scrollbar">
                                            <div className="flex items-center gap-2 text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest"><Icon name="clipboard-list" size={12}/> Medical Records (Slide 44)</div>
                                            <div className="text-[10px] font-mono whitespace-pre-wrap leading-tight text-slate-600 bg-white p-3 rounded-lg border border-slate-200 shadow-inner min-h-[120px]">{documentation || "Drafting clinical notes..."}</div>
                                            <button onClick={() => setStep('picker')} className="mt-8 w-full py-2 border border-slate-200 rounded-xl text-[10px] font-black text-slate-400 uppercase hover:bg-slate-100 transition-colors">Change Scenario</button>
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col bg-white">
                                        <div ref={scrollRef} className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                                            {messages.length === 0 && (
                                                <div className="p-8 bg-slate-50 border border-slate-100 rounded-3xl text-center">
                                                    <p className="italic text-slate-600 mb-4 leading-relaxed">"{activeScenario.initialTrigger}"</p>
                                                    <p className="text-[10px] font-black nhs-text uppercase tracking-widest">Open the call professionally to begin.</p>
                                                </div>
                                            )}
                                            {messages.map((msg, i) => (
                                                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                    <div className={`max-w-[80%] p-4 rounded-3xl shadow-sm ${msg.role === 'user' ? 'bg-[#232f3e] text-white rounded-tr-none' : 'bg-blue-50 text-slate-900 rounded-tl-none border border-blue-100'}`}>
                                                        <p className="text-sm font-medium leading-relaxed">{msg.text}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-6 border-t bg-slate-50 flex gap-3">
                                            <textarea value={userInput} onChange={e => setUserInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), processResponse(userInput))} className="flex-1 p-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-[#005EB8] outline-none text-sm min-h-[80px] shadow-sm resize-none" placeholder="Type your response... (Use Miller's Law and 4-Part Structure)" />
                                            <button onClick={() => processResponse(userInput)} disabled={isTyping} className="nhs-blue text-white px-8 rounded-2xl font-black shadow-xl hover:bg-[#003f7a] transition-all flex items-center justify-center"><Icon name="paper-plane" size={20}/></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <audio ref={audioRef} />
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
