<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHS Elite De-escalation Lab</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome for reliable icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F0F4F8; color: #1e293b; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .nhs-blue { background-color: #005EB8; }
        .nhs-text { color: #005EB8; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        (function() {
            const { useState, useEffect, useRef } = React;
            
            const Icon = ({ name, size = 20, className = "", spin = false }) => (
                <i className={`fa-solid fa-${name} ${spin ? 'fa-spin' : ''} ${className}`} style={{ fontSize: size }}></i>
            );

            // API Key for your Google Account
            const apiKey = "AIzaSyD0ihaE53aT1d81aQPzkk05-Xz23c0R2uc"; 
            const appId = "nhs-elite-lab-beta";

            const SCENARIOS = [
                {
                    id: 'henderson',
                    title: 'The Demanding Patient',
                    type: 'Demanding / Fear',
                    patientName: 'Mr. Henderson',
                    context: 'Angry because his blood pressure prescription isn’t at the pharmacy. He’s been in the 8 AM phone queue and feels dismissed.',
                    initialTrigger: "I've been waiting for my prescription for three days! Every time I call the pharmacy they tell me the Practice hasn't signed it. I'm out of my pills, what am I supposed to do?",
                    baseMood: "furious"
                },
                {
                    id: 'gaskell',
                    title: 'The Manipulative Patient',
                    type: 'Manipulation (Splitting Staff)',
                    patientName: 'Mrs. Gaskell',
                    context: 'Trying to bypass the triage system. Claims Dr. Khan "always makes an exception" for her and told her to just call and get squeezed in.',
                    initialTrigger: "Look, dear, I know you're busy, but Dr. Khan specifically told me to call and he'd see me today. He knows my situation. Surely you can just pop me in his list?",
                    baseMood: "insistent"
                },
                {
                    id: 'sterling',
                    title: 'The Entitled Patient',
                    type: 'Entitlement',
                    patientName: 'Mr. Sterling',
                    context: 'Refuses to use the new online triage system. Believes that as a "taxpayer" he shouldn’t have to "do the work" for the staff.',
                    initialTrigger: "I'm not filling in a bloody online form. I pay my taxes for this service. I want to speak to a human being and get an appointment now. Why are you making it so difficult?",
                    baseMood: "superior"
                }
            ];

            const App = () => {
                const [step, setStep] = useState('intro'); 
                const [activeScenario, setActiveScenario] = useState(SCENARIOS[0]);
                const [messages, setMessages] = useState([]);
                const [userInput, setUserInput] = useState('');
                const [isTyping, setIsTyping] = useState(false);
                const [agitation, setAgitation] = useState(60);
                const [contactPhase, setContactPhase] = useState('Opening');
                const [boundaryRung, setBoundaryRung] = useState(1);
                const [detectedTactic, setDetectedTactic] = useState(null);
                const [mentorFeedback, setMentorFeedback] = useState("Greet the person using the 4-Part Contact Structure.");
                const [documentation, setDocumentation] = useState("");
                const [errorLog, setErrorLog] = useState(null);
                const [availableVoices, setAvailableVoices] = useState([]);

                const scrollRef = useRef(null);

                useEffect(() => {
                    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }, [messages, isTyping]);

                // Initialise Voices
                useEffect(() => {
                    const loadVoices = () => {
                        const voices = window.speechSynthesis.getVoices();
                        setAvailableVoices(voices);
                    };
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                    loadVoices();
                }, []);

                const speak = (text) => {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    // Find UK voice
                    const ukVoice = availableVoices.find(v => v.lang === 'en-GB' && v.name.toLowerCase().includes('male')) 
                                  || availableVoices.find(v => v.lang === 'en-GB')
                                  || availableVoices.find(v => v.lang.startsWith('en'));
                    
                    if (ukVoice) utterance.voice = ukVoice;
                    utterance.rate = agitation > 75 ? 1.25 : 0.95;
                    utterance.pitch = agitation > 75 ? 1.1 : 0.9;
                    window.speechSynthesis.speak(utterance);
                };

                const callGemini = async (payload, modelName = "gemini-1.5-flash") => {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        // If standard flash fails, try flash-latest (common fix for "model not found")
                        if (response.status === 404 && modelName === "gemini-1.5-flash") {
                            return callGemini(payload, "gemini-1.5-flash-latest");
                        }
                        const err = await response.json();
                        throw new Error(err.error?.message || `API Error ${response.status}`);
                    }
                    return response.json();
                };

                const processResponse = async (userMsg) => {
                    if (!userMsg.trim()) return;
                    setIsTyping(true);
                    setErrorLog(null);
                    setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                    const currentInput = userMsg;
                    setUserInput('');

                    try {
                        const systemPrompt = `You are the Expert Coach (Lindsay) and the Character (${activeScenario.patientName}). 
                        LOCATION: NHS GP Surgery (UK).
                        CONTEXT: ${activeScenario.context}
                        STRICT NHS RULES: Use 'Postcode', 'GP', 'Surgery'. Follow the Dubock Framework.
                        
                        OUTPUT JSON ONLY: 
                        { 
                          "patientReply": "dialogue", 
                          "agitationDelta": number -20 to 20, 
                          "tacticDetected": "MDE tactic name or null", 
                          "currentPhase": "Open|Gather|Check|Close", 
                          "mentorFeedback": "coaching text", 
                          "rungLevel": 1-5, 
                          "docEntry": "Slide 44 clinical note" 
                        }`;

                        const payload = {
                            contents: [{ parts: [{ text: `Current Agitation: ${agitation}. User just said: "${currentInput}"` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        };

                        const result = await callGemini(payload);
                        const parsed = JSON.parse(result.candidates[0].content.parts[0].text);

                        const newAgit = Math.min(100, Math.max(0, agitation + (parsed.agitationDelta || 0)));
                        setAgitation(newAgit);
                        if (parsed.currentPhase) setContactPhase(parsed.currentPhase);
                        setDetectedTactic(parsed.tacticDetected);
                        setMentorFeedback(parsed.mentorFeedback);
                        if (parsed.rungLevel) setBoundaryRung(parsed.rungLevel);
                        if (parsed.docEntry) setDocumentation(prev => prev + "\n" + parsed.docEntry);
                        
                        setMessages(prev => [...prev, { role: 'ai', text: parsed.patientReply }]);
                        speak(parsed.patientReply);
                        
                    } catch (e) {
                        console.error(e);
                        setErrorLog(e.message);
                    } finally { setIsTyping(false); }
                };

                const handleReset = () => {
                    setMessages([]);
                    setAgitation(60);
                    setContactPhase('Opening');
                    setBoundaryRung(1);
                    setDetectedTactic(null);
                    setDocumentation("");
                    setErrorLog(null);
                    setStep('picker');
                };

                if (step === 'intro') return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-4xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
                            <div className="md:w-1/2 nhs-blue p-12 flex flex-col justify-center text-white">
                                <Icon name="shield-halved" size={40} className="mb-4 opacity-80" />
                                <h1 className="text-6xl font-black mb-6 tracking-tighter leading-none uppercase">Conflict<br/>Lab 2.0</h1>
                                <p className="text-blue-100 mb-10 font-medium">BETA: High-fidelity de-escalation training for NHS General Practice.</p>
                                <button onClick={() => setStep('picker')} className="bg-white nhs-text py-5 px-12 rounded-2xl font-black shadow-2xl hover:scale-105 transition-all w-fit uppercase text-sm tracking-widest">Enter Surgery</button>
                            </div>
                            <div className="md:w-1/2 bg-slate-50 p-12 flex flex-col justify-center gap-4">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex gap-4">
                                    <Icon name="bullseye" className="nhs-text shrink-0" />
                                    <div><p className="font-bold text-slate-800 uppercase text-xs">The Dubock Framework</p><p className="text-xs text-slate-500">Live AI coaching on empathy and boundaries.</p></div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex gap-4">
                                    <Icon name="microphone" className="nhs-text shrink-0" />
                                    <div><p className="font-bold text-slate-800 uppercase text-xs">Audio Feedback</p><p className="text-xs text-slate-500">Hear the patient's voice response in real-time.</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                );

                if (step === 'picker') return (
                    <div className="min-h-screen p-8 flex flex-col items-center justify-center bg-slate-50 text-center">
                        <h2 className="text-4xl font-black text-slate-800 mb-2 tracking-tighter uppercase">Select Scenario</h2>
                        <p className="text-slate-500 mb-8 max-w-md italic">Practice management of Challenging, Manipulative, and Entitled behaviors.</p>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl w-full text-left">
                            {SCENARIOS.map(s => (
                                <button key={s.id} onClick={() => { setActiveScenario(s); setStep('sim'); }} className="bg-white p-8 rounded-[40px] shadow hover:shadow-2xl border-2 border-transparent hover:border-[#005EB8] transition-all group">
                                    <span className="text-[10px] font-black uppercase nhs-text bg-blue-50 px-2 py-1 rounded mb-4 inline-block tracking-widest">{s.type}</span>
                                    <h3 className="text-xl font-bold mb-2 text-slate-800 group-hover:nhs-text">{s.patientName}</h3>
                                    <p className="text-xs text-slate-500 leading-relaxed line-clamp-3">{s.context}</p>
                                    <div className="mt-4 flex items-center gap-2 nhs-text font-bold text-[10px] opacity-0 group-hover:opacity-100">START CASE <Icon name="arrow-right" size={12}/></div>
                                </button>
                            ))}
                        </div>
                    </div>
                );

                return (
                    <div className="h-screen flex flex-col p-4 gap-4 overflow-hidden bg-slate-100">
                        <div className="grid grid-cols-4 gap-4">
                            <div className="bg-white rounded-2xl p-4 shadow-sm flex items-center gap-4 border border-slate-200">
                                <div className="nhs-blue p-3 rounded-xl text-white"><Icon name="clock" size={18}/></div>
                                <div className="flex-1">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Contact Phase</p>
                                    <p className="font-black nhs-text text-sm uppercase">{contactPhase}</p>
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl p-4 shadow-sm flex items-center gap-4 border border-slate-200">
                                <div className="bg-amber-100 p-3 rounded-xl text-amber-600"><Icon name="ladder-water" size={18}/></div>
                                <div className="flex-1">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Boundaries</p>
                                    <p className="font-black text-amber-700 text-sm uppercase">Level {boundaryRung}</p>
                                </div>
                            </div>
                            <div className="col-span-2 bg-[#232f3e] rounded-2xl p-4 shadow-xl flex items-center gap-4 border border-white/10">
                                <Icon name="brain" className="text-blue-300 shrink-0" size={24}/>
                                <div className="text-blue-100 italic text-sm font-medium leading-tight">"{mentorFeedback}"</div>
                            </div>
                        </div>

                        <div className="flex-1 flex gap-4 overflow-hidden">
                            <div className="flex-1 bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden relative border border-slate-200">
                                {isTyping && (
                                    <div className="absolute inset-0 bg-white/70 backdrop-blur-sm z-50 flex flex-col items-center justify-center font-black nhs-text text-lg">
                                        <Icon name="spinner" spin={true} size={40} className="mb-4" />
                                        ANALYSING...
                                    </div>
                                )}
                                
                                {errorLog && (
                                    <div className="absolute top-4 left-1/2 -translate-x-1/2 z-[60] bg-red-600 text-white p-4 rounded-xl shadow-2xl flex items-center gap-3">
                                        <Icon name="triangle-exclamation" />
                                        <span className="text-xs font-bold uppercase tracking-widest">{errorLog}</span>
                                        <button onClick={() => setErrorLog(null)} className="ml-4 opacity-50 hover:opacity-100"><Icon name="xmark" /></button>
                                    </div>
                                )}

                                <div className="nhs-blue p-4 text-white font-bold flex justify-between items-center">
                                    <span className="text-[10px] tracking-widest uppercase font-black tracking-widest">NHS GP LAB: {activeScenario.patientName}</span>
                                    {detectedTactic && <span className="bg-red-600 px-3 py-1 rounded-full text-[10px] animate-pulse border border-white/30 uppercase">TACTIC: {detectedTactic}</span>}
                                </div>
                                
                                <div className="flex-1 flex overflow-hidden">
                                    <div className="w-80 border-r bg-slate-50 flex flex-col">
                                        <div className={`h-1/2 flex flex-col items-center justify-center p-8 transition-colors duration-1000 ${agitation > 70 ? 'bg-red-50 text-red-600 pulse-red' : agitation > 40 ? 'bg-amber-50 text-amber-600' : 'bg-green-50 text-green-600'}`}>
                                            <Icon name={agitation > 70 ? "face-angry" : agitation > 40 ? "face-frown-open" : "face-smile"} size={100} />
                                            <p className="mt-4 font-black uppercase tracking-tighter text-lg">{agitation > 70 ? 'CRITICAL' : agitation > 40 ? 'ESCALATED' : 'STABLE'}</p>
                                            <div className="w-full h-1.5 bg-gray-200 rounded-full mt-4 overflow-hidden">
                                                <div className="h-full bg-current transition-all duration-1000 shadow-[0_0_8px_rgba(255,255,255,0.5)]" style={{width:`${agitation}%`}}></div>
                                            </div>
                                        </div>
                                        <div className="flex-1 p-4 overflow-y-auto">
                                            <div className="flex items-center gap-2 text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest"><Icon name="file-medical" size={12}/> Medical Records (Slide 44)</div>
                                            <div className="text-[10px] font-mono whitespace-pre-wrap leading-tight text-slate-600 bg-white p-3 rounded-lg border border-slate-200 shadow-inner h-32 overflow-y-auto custom-scrollbar">{documentation || "..."}</div>
                                            <button onClick={handleReset} className="mt-8 w-full py-2 border border-slate-200 rounded-xl text-[10px] font-black text-slate-400 uppercase hover:bg-slate-100">Reset Scenario</button>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 flex flex-col bg-white">
                                        <div ref={scrollRef} className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                                            {messages.length === 0 && (
                                                <div className="bg-slate-50 border border-slate-100 rounded-2xl p-8 text-center shadow-inner">
                                                    <p className="italic text-slate-600 mb-4 leading-relaxed">"{activeScenario.initialTrigger}"</p>
                                                    <p className="text-[10px] font-black nhs-text uppercase tracking-widest">Initiate professional contact to begin.</p>
                                                </div>
                                            )}
                                            {messages.map((msg, i) => (
                                                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                    <div className={`max-w-[80%] p-4 rounded-3xl shadow-sm ${msg.role === 'user' ? 'bg-[#232f3e] text-white rounded-tr-none' : 'bg-blue-50 text-slate-900 rounded-tl-none border border-blue-100'}`}>
                                                        <p className="text-sm leading-relaxed">{msg.text}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-6 border-t bg-slate-50 flex gap-3">
                                            <textarea value={userInput} onChange={e => setUserInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), processResponse(userInput))} className="flex-1 p-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-[#005EB8] outline-none text-sm min-h-[80px] shadow-sm resize-none" placeholder="Enter response... (Apply Miller's Law)" />
                                            <button onClick={() => processResponse(userInput)} disabled={isTyping} className="nhs-blue text-white px-8 rounded-2xl font-black shadow-xl hover:bg-[#003f7a] transition-all flex items-center justify-center min-w-[80px]"><Icon name="paper-plane" size={20}/></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
